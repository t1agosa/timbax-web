<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbax - Anotador Multijuego</title>
    <meta name="description" content="El anotador oficial de todas tus partidas de Truco, Generala, Chinchón y Mosca. Disponible para Android y iOS.">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2979FF 0%, #1565C0 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 16px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 32px;
            opacity: 0.95;
        }

        .games {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 48px;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 64px;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: #fff;
            color: #2979FF;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-disabled {
            background: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            cursor: not-allowed;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .btn-disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .coming-soon {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 8px;
        }

        footer {
            margin-top: auto;
            padding-top: 32px;
            opacity: 0.8;
        }

        footer p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .logo {
                font-size: 56px;
            }

            .tagline {
                font-size: 20px;
            }

            .subtitle {
                font-size: 16px;
            }

            .games {
                font-size: 18px;
            }

            .btn {
                font-size: 16px;
                padding: 14px 28px;
            }
        }

        /* Tablet and up */
        @media (min-width: 768px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
            }

            .btn {
                flex: 0 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">TIMBAX</h1>
        
        <p class="tagline">Anotador Multijuego</p>
        <p class="subtitle">El anotador oficial de todas tus partidas</p>
        
        <p class="games">Truco • Generala • Chinchón • Mosca</p>
        
        <div class="buttons">
            <a href="https://play.google.com/store/apps/details?id=com.timbax.app" class="btn btn-disabled">
                Descargar para Android
            </a>
            <a href="https://apps.apple.com/app/timbax/id0000000000" class="btn btn-disabled">
                Descargar para iOS
            </a>
        </div>
        
        <p class="coming-soon">Próximamente en Google Play y App Store</p>
    </div>

    <footer>
        <p>Timbax ® 2026 - Todos los derechos reservados</p>
        <p>© Tiago Salto Arce</p>
        <p style="margin-top: 8px;">Hecho con ❤️ en Argentina</p>
    </footer>
</body>
</html>
